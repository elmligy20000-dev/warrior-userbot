name: Run Source Azef

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # كل 5 دقايق يتأكد انه شغال

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 6 ساعات ويعيد تشغيل

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Create session file
      run: |
        echo "${{ secrets.SESSION_STRING }}" | base64 -d > source_azef.session
    
    - name: Run Bot
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
      run: python source_azef.py
